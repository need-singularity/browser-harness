[package]
name = "browser-harness"
version = "0.3.1"
description = "Playwright-based browser automation harness for dancinlab fleet. Fresh-context factory (mandate 1-6) + probe + selftest + real oauth-login (slot-isolated storageState persistence) + Mac→ubu1/ubu2/fleet SSH-pipe transport (lib/remote.cjs). v0.3.1: symmetric remote selftest (F1/F2/F3/F6 + F5-remote/F7-remote/F8-remote shipped via tests/selftest_remote.cjs) + exit-52 SCP-back skipped when slot file is byte-identical (sha256). See docs/oauth-login.md."
entry = "bin/browser-harness"
license = "MIT"

[package.dependencies]
node = ">=18.0.0"
